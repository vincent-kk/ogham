name: CI

on:
  # Run CI only when real source/test code changes.
  # Docs-only (**.md) or config/manifest-only (**.json) changes skip the matrix.
  # A PR mixing code with docs/config still runs (any matched path triggers).
  push:
    branches: [main]
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.jsx"
      - "**.mjs"
      - "**.cjs"
  pull_request:
    branches: [main]
    paths:
      - "**.ts"
      - "**.tsx"
      - "**.js"
      - "**.jsx"
      - "**.mjs"
      - "**.cjs"

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Typecheck (cennad tests)
        run: yarn cennad typecheck:tests

      - name: Build
        run: yarn build:all

      - name: Test
        run: yarn test:run

      - name: Lint
        run: yarn lint
