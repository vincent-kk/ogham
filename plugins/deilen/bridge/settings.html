.form{display:flex;flex-direction:column}.section{padding:24px 0;border-bottom:1px solid var(--border)}.section:last-of-type{border-bottom:none}.section-title{margin:0 0 14px;font-size:14px;font-weight:600;color:var(--text)}.section-help{margin:-8px 0 16px;color:var(--text-muted);font-size:12px;line-height:1.6}.field{display:flex;flex-direction:column;gap:6px}.field+.field,.toggle+.toggle{margin-top:14px}.toggle+.grid{margin-top:16px}.field-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.grid .field+.field{margin-top:0}.input{width:100%;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-subtle);color:var(--text);font-family:inherit;font-size:14px;transition:border-color var(--transition),box-shadow var(--transition)}.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}.radio-row{display:flex;gap:8px;flex-wrap:wrap}.radio{position:relative;cursor:pointer}.radio input{position:absolute;opacity:0;inset:0;cursor:pointer}.radio span{display:inline-block;padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-subtle);color:var(--text-muted);font-size:13px;transition:border-color var(--transition),background var(--transition),color var(--transition)}.radio:hover span{border-color:var(--border-strong);color:var(--text)}.radio input:checked+span{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}.radio input:focus-visible+span{box-shadow:0 0 0 3px var(--accent-soft)}.toggle{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;position:relative}.toggle input{position:absolute;opacity:0;inset:0;pointer-events:none}.toggle-track{width:36px;height:20px;background:var(--bg-inset);border:1px solid var(--border-strong);border-radius:999px;position:relative;flex-shrin   <body>
    <script>
      window.__DEILEN_STATE__ = "__DEILEN_STATE__";
    </script>

    <main class="shell">
      <header class="masthead">
        <div class="brand-row">
          <span class="brand" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M4 4h11l5 5v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z"
              />
              <path d="M14 4v5h5" />
              <path d="M8 13h6M8 17h4" />
            </svg>
          </span>
          <span class="brand-name">deilen</span>
          <span class="brand-tag">/ settings</span>
        </div>
        <p class="lede">
          Theme, behavior, renderers, and size limits for the viewer.
        </p>
      </header>

      <form id="form" class="form" novalidate>
        <section class="section">
          <h2 class="section-title">Appearance</h2>
          <div class="field">
            <span class="field-label">Theme</span>
            <div class="radio-row" id="theme">
              <label class="radio"
                ><input type="radio" name="theme" value="light" /><span
                  >Light</span
                ></label
              >
              <label class="radio"
                ><input type="radio" name="theme" value="dark" /><span
                  >Dark</span
                ></label
              >
              <label class="radio"
                ><input type="radio" name="theme" value="auto" /><span
                  >Auto</span
                ></label
              >
            </div>
          </div>
          <div class="field">
            <label class="field-label" for="content_width_px"
              >Content width (px)</label
            >
            <input
              class="input"
              type="number"
              id="content_width_px"
              min="480"
              max="1600"
            />
          </div>
          <div class="field">
            <label class="field-label" for="font_family"
              >Body font family</label
            >
            <input
              class="input"
              type="text"
              id="font_family"
              placeholder="System default"
            />
          </div>
        </section>

        <section class="section">
          <h2 class="section-title">Behavior</h2>
          <label class="toggle">
            <input type="checkbox" id="auto_open" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label"
              >Open the browser automatically on render</span
            >
          </label>
          <div class="grid">
            <div class="field">
              <label class="field-label" for="collect_timeout_seconds"
                >Collect timeout (s)</label
              >
              <input
                class="input"
                type="number"
                id="collect_timeout_seconds"
                min="1"
                max="600"
              />
            </div>
            <div class="field">
              <label class="field-label" for="idle_shutdown_minutes"
                >Idle shutdown (min)</label
              >
              <input
                class="input"
                type="number"
                id="idle_shutdown_minutes"
                min="1"
                max="120"
              />
            </div>
            <div class="field">
              <label class="field-label" for="session_ttl_hours"
                >Session TTL (h)</label
              >
              <input
                class="input"
                type="number"
                id="session_ttl_hours"
                min="1"
                max="720"
              />
            </div>
            <div class="field">
              <label class="field-label" for="preferred_port"
                >Port (0 = dynamic)</label
              >
              <input
                class="input"
                type="number"
                id="preferred_port"
                min="0"
                max="65535"
              />
            </div>
          </div>
        </section>

        <section class="section">
          <h2 class="section-title">Renderers</h2>
          <p class="section-help">
            Disabling a renderer skips its client-side enhancement; source stays
            readable.
          </p>
          <label class="toggle">
            <input type="checkbox" id="renderer_highlight" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Syntax highlighting</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="renderer_mermaid" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Mermaid diagrams</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="renderer_math" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-label">Math (KaTeX)</span>
          </label>
        </section>

        <section class="section">
          <h2 class="section-title">Limits</h2>
          <div class="grid">
            <div class="field">
              <label class="field-label" for="max_image_mb"
                >Max image (MB)</label
              >
              <input
                class="input"
                type="number"
                id="max_image_mb"
                min="1"
                max="100"
              />
            </div>
            <div class="field">
              <label class="field-label" for="max_payload_mb"
                >Max payload (MB)</label
              >
              <input
                class="input"
                type="number"
                id="max_payload_mb"
                min="1"
                max="200"
              />
            </div>
            <div class="field">
              <label class="field-label" for="max_viewer_mb"
                >Max document (MB)</label
              >
              <input
                class="input"
                type="number"
                id="max_viewer_mb"
                min="1"
                max="50"
              />
            </div>
          </div>
        </section>
      </form>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="save">Save</button>
        <button type="button" class="btn btn-secondary" id="save-close">
          Save &amp; Close
        </button>
      </div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </main>

  </body>
</html>
